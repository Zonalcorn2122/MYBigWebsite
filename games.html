<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minispiele</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/darkmode.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header>

    <h1>Minispiele</h1>

    <nav>
        <a href="index.html">Start</a>
        <a href="gallery.html">Galerie</a>
        <a href="chat.html">Chat</a>
        <a href="contact.html">Kontakt</a>
        <a href="profile.html">Profil</a>
    </nav>

</header>

<main>

<h2>Unsere Spiele</h2>

<input type="text" placeholder="Spiel suchen...">

<div class="games">

    <!-- 🐍 Snake -->
    <div class="game">
        <h3> Snake</h3>
        <p>Klassisches Snake-Spiel.</p>
        <button id="snakeGame">Starten</button>
    </div>

    <canvas id="game" width="400" height="400"></canvas>

    <!-- 🧠 Memory -->
    <div class="game">
        <h3> Memory</h3>
        <p>Finde alle Kartenpaare.</p>
        <button id="memoryBtn">Starten</button>
        <div id="memoryGame"></div>
    </div>

    <!-- ⭕❌ Tic Tac Toe -->
    <div class="game">
        <h3> Tic Tac Toe</h3>
        <p>Spiele gegen den Computer.</p>
        <button id="tttBtn">Starten</button>
        <div id="ttt"></div>
    </div>

    <!-- ⚡ Reaction -->
    <div class="game">
        <h3> Reaktionstest</h3>
        <p>Teste deine Geschwindigkeit.</p>
        <button id="reactionBtn">Starten</button>
        <div id="reactionGame"></div>
    </div>

</div>

</main>

<footer>
    © 2026 Mega Website
</footer>

<!-- JS -->
<script src="js/app.js"></script>
<script src="js/games/snake.js"></script>
<script src="js/games/memory.js"></script>
<script src="js/games/tictactoe.js"></script>
<script src="js/games/reaction.js"></script>

</body>
</html>
